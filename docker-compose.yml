services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ght
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ght_dev_password}
      POSTGRES_DB: ght_shop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ght"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://ght:${POSTGRES_PASSWORD:-ght_dev_password}@db:5432/ght_shop
      STRIPE_MOCK: ${STRIPE_MOCK:-true}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-this-to-a-long-random-secret}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8000}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      DOWNLOAD_SECRET: ${DOWNLOAD_SECRET:-change-this-secret-in-production}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./public/maps:/app/public/maps

  # Dev-only: run frontend with hot reload (comment out for production)
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  pgdata:
  node_modules:
